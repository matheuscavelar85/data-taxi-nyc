networks:
  datapipeline:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    networks:
      - datapipeline
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    networks:
      - datapipeline
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"

  minio:
    image: minio/minio:latest
    networks:
      - datapipeline
    ports:
      - "9000:9000"
      - "9001:9001"
    command: minio server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build: ./producer
    networks:
      - datapipeline
    depends_on:
      - kafka
    volumes:
      - ./data:/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: taxi-rides
      DATA_PATH: /data/train.csv
      PUBLISH_INTERVAL: "0.1"
    restart: on-failure

  consumer:
    build: ./consumer
    networks:
      - datapipeline
    depends_on:
      - kafka
      - minio
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: taxi-rides
      BATCH_SIZE: "100"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: nyc-taxi
    restart: on-failure

  postgres-dbt:
    image: postgres:14-alpine
    container_name: postgres-dbt
    networks:
      - datapipeline
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: analytics_warehouse
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_password
    volumes:
      - postgres-dbt-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d analytics_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  dbt:
    build: ./dbt
    networks:
      - datapipeline
    depends_on:
      - postgres-dbt
    environment:
      DB_HOST: postgres-dbt
      DB_PORT: "5432"
      DB_NAME: analytics_warehouse
      DB_USER: dbt_user
      DB_PASSWORD: dbt_password
    profiles:
      - never

  airflow-postgres:
    image: postgres:13
    networks:
      - datapipeline
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    networks:
      - datapipeline
    depends_on:
      airflow-postgres:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SECRET_KEY: airflow-secret-key-2026
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: nyc-taxi
      DB_HOST: postgres-dbt
      DB_PORT: "5432"
      DB_NAME: analytics_warehouse
      DB_USER: dbt_user
      DB_PASSWORD: dbt_password
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/airflow/dbt
    command: >
      bash -c "airflow db init && airflow webserver"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    networks:
      - datapipeline
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SECRET_KEY: airflow-secret-key-2026
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: nyc-taxi
      DB_HOST: postgres-dbt
      DB_PORT: "5432"
      DB_NAME: analytics_warehouse
      DB_USER: dbt_user
      DB_PASSWORD: dbt_password
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/airflow/dbt
    command: >
      bash -c "sleep 20 && airflow scheduler"

volumes:
  minio-data:
  postgres-dbt-data:
  postgres-airflow-data:

