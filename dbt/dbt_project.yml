name: 'taxi_pipeline'
version: '1.0.0'
config-version: 2

profile: 'taxi_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  minio_endpoint:     "http://minio:9000"
  minio_bucket:       "nyc-taxi"
  raw_prefix:         "raw"

  filter_start_date:  '2015-01-01'
  filter_end_date:    '2015-01-31'
  filter_min_lon:     -74.05
  filter_max_lon:     -73.75
  filter_min_lat:      40.58
  filter_max_lat:      40.90

models:
  taxi_pipeline:
    staging:
      +materialized: view
      +schema: dbt_dev_silver
    marts:
      +materialized: table
      +schema: dbt_dev_gold
